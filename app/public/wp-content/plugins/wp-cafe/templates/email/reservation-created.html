<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reservation Confirmation</title>
        <style>
            /* Reset styles for email clients */
            body,
            table,
            td,
            p,
            a,
            li,
            blockquote {
                -webkit-text-size-adjust: 100%;
                -ms-text-size-adjust: 100%;
            }

            table,
            td {
                mso-table-lspace: 0pt;
                mso-table-rspace: 0pt;
            }

            img {
                -ms-interpolation-mode: bicubic;
                border: 0;
                height: auto;
                line-height: 100%;
                outline: none;
                text-decoration: none;
            }

            /* Main styles */
            body {
                margin: 0 !important;
                padding: 0 !important;
                background-color: #f4f4f4;
                font-family: Arial, sans-serif;
            }

            .email-container {
                max-width: 800px;
                margin: 0 auto;
                background-color: #ffffff;
            }

            .header {
                padding: 30px 20px;
                text-align: center;
                background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
                color: #ffffff;
            }

            .restaurant-name {
                font-size: 32px;
                font-weight: bold;
                color: #ffffff;
                margin: 0;
                letter-spacing: 1px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            }

            .content {
                padding: 30px 40px;
                line-height: 1.6;
                font-size: 14px;
                color: #666666;
            }

            .footer {
                background-color: #f8f8f8;
                padding: 20px;
                text-align: center;
                font-size: 12px;
                color: #999999;
                border-top: 1px solid #dddddd;
            }

            .footer p {
                margin: 5px 0;
            }

            .footer a {
                color: #ff6b35;
                text-decoration: none;
            }

            .wpc-powered-by {
                margin: 15px 0 0 0;
                padding-top: 15px;
                border-top: 1px solid #dddddd;
                font-size: 11px;
                color: #b3b3b3;
                font-style: italic;
            }

            /* Mobile responsive */
            @media only screen and (max-width: 600px) {
                .email-container {
                    width: 100% !important;
                }

                .content {
                    padding: 20px !important;
                }

                .restaurant-name {
                    font-size: 24px !important;
                }

                .header {
                    padding: 20px 15px !important;
                }
            }
        </style>
    </head>

    <body>
        <table
            role="presentation"
            cellspacing="0"
            cellpadding="0"
            border="0"
            width="100%"
        >
            <tr>
                <td>
                    <div class="email-container">
                        <!-- Header -->
                        <div class="header">
                            <h1 class="restaurant-name">
                                {%reservation_branch_name%}
                            </h1>
                        </div>

                        <!-- Main Content -->
                        <div class="content">{{MESSAGE}}</div>
                        <!-- Main Content -->

                        <!-- Footer -->
                        <div class="footer">
                            <p>
                                &copy; 2026 {%reservation_branch_name%}. All
                                rights reserved.
                            </p>
                            <!-- Added Contact Information -->
                            <p
                                style="
                                    margin: 10px 0 5px 0;
                                    font-size: 13px;
                                    color: #666666;
                                "
                            >
                                Contact Info:
                                <a
                                    href="tel:{%restaurant_phone%}"
                                    style="color: #ff6b35"
                                    >{%restaurant_phone%}</a
                                >
                                |
                                <a
                                    href="mailto:{%restaurant_email%}"
                                    style="color: #ff6b35"
                                    >{%restaurant_email%}</a
                                >
                            </p>
                            <p>{%reservation_branch_address%}</p>
                            <!-- Branding Section -->
                            {%powered_by_section%}
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </body>
</html>
